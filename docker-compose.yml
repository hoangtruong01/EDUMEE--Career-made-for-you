services:
  backend:
    image: ${BACKEND_IMAGE:-thile12/edumee-backend:latest}
    platform: linux/amd64
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: edumee-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./be/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      - edumee-network

  frontend:
    image: ${FRONTEND_IMAGE:-thile12/edumee-frontend:latest}
    platform: linux/amd64
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: edumee-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./fe/.env
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - edumee-network

networks:
  edumee-network:
    driver: bridge
