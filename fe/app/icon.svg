<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" fill="none">
  <!-- Outer edges -->
  <!-- Left edge: top → bottom-left (dark navy) -->
  <line x1="60" y1="10" x2="14" y2="88" stroke="#1B2E66" stroke-width="6" stroke-linecap="round"/>
  <!-- Bottom edge: bottom-left → bottom-right (lime) -->
  <line x1="14" y1="88" x2="106" y2="88" stroke="#8DC63F" stroke-width="7" stroke-linecap="round"/>
  <!-- Right edge: top → bottom-right (teal) -->
  <line x1="60" y1="10" x2="106" y2="88" stroke="#29B8C3" stroke-width="6" stroke-linecap="round"/>
  <!-- Inner edges to center node -->
  <!-- top → center (navy) -->
  <line x1="60" y1="10" x2="60" y2="56" stroke="#1B2E66" stroke-width="5" stroke-linecap="round"/>
  <!-- bottom-left → center (navy) -->
  <line x1="14" y1="88" x2="60" y2="56" stroke="#1B2E66" stroke-width="5" stroke-linecap="round"/>
  <!-- bottom-right → center (teal) -->
  <line x1="106" y1="88" x2="60" y2="56" stroke="#29B8C3" stroke-width="5" stroke-linecap="round"/>
  <!-- Nodes (drawn last to appear on top) -->
  <circle cx="60"  cy="10" r="10" fill="#1B2E66"/>
  <circle cx="60"  cy="56" r="9"  fill="#29B8C3"/>
  <circle cx="14"  cy="88" r="10" fill="#8DC63F"/>
  <circle cx="106" cy="88" r="10" fill="#29B8C3"/>
</svg>
